<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#49c7ee" />
  <title>WAVES Beach Lounge Menu</title>
  <meta name="description" content="WAVES Beach Lounge digital menu" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <div class="brand">
      <div class="mark">≈</div>
      <div>
        <h1>WAVES</h1>
        <p>Beach Lounge</p>
      </div>
    </div>
    <div class="langs" aria-label="Language switcher">
      <button data-lang="ar" class="active">عربي</button>
      <button data-lang="en">EN</button>
      <button data-lang="ru">RU</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <p class="eyebrow" data-i="eyebrow">قائمة الطعام والمشروبات</p>
      <h2 data-i="title">WAVES Beach Lounge</h2>
      <p data-i="subtitle">منيو خفيف وسريع للفتح على كل الموبايلات.</p>
      <input id="search" type="search" placeholder="ابحث في المنيو..." autocomplete="off" />
    </section>

    <nav id="cats" class="cats"></nav>
    <section id="menu" class="menu"></section>
  </main>

  <footer>
    <b>WAVES Beach Lounge</b>
    <span>© 2026</span>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
